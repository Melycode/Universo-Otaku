<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Otaku</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>


<body>
    <header class="top-nav">
        <div class="nav-container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="https://res.cloudinary.com/dfhwxnhsl/image/upload/v1770470665/logo1_jlbj92.png" alt="Logo Mundo Otaku" class="logo-img">
                </a>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar mangas...">
                <i class="fa-solid fa-search search-icon"></i>
            </div>

            <div class="mobile-menu-icon">
                <i class="fa-solid fa-bars"></i>
            </div>


            <div class="nav-actions">
                <nav class="desktop-menu">
                    <a href="#">Novedades</a>
                    <a href="#">Catálogo</a>
                    <a href="#">Blog</a>
                </nav>
                <button class="btn-nav" id="btnSuscribete">SUSCRÍBETE</button>

                <button class="icon-btn" id="cartBtn">
                    <i class="fa-solid fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <section class="promo-banner">
    <div class="promo-content">
        <h3 class="promo-text">¡BIENVENIDO A UNIVERSO OTAKU! —  La mayor colección de mangas</h3>
    </div>
</section>

    <section class="hero-banner">
        <img src="https://res.cloudinary.com/dfhwxnhsl/image/upload/v1770487026/hero3_-_copia_xojrzc.jpg" alt="Colección de mangas" class="hero-img"/>
    </section>

    
<section class="catalog">
   <div class="catalog-header">
    <h2 class="title-section">Catálogo</h2>

    <div class="filters-container">
        <div class="filter-group">
            <label for="sortBy">Ordenar por:</label>
            <select id="sortBy" class="filter-select">
                <option value="default">Seleccionar</option>
                <option value="title">Título</option>
                <option value="author">Autor</option>
                <option value="price-low">Precio: Menor a Mayor</option>
                <option value="price-high">Precio: Mayor a Menor</option>
            </select>
        </div>
    </div>
   </div>

   <div class="catalog-grid"></div> 
</section>


    <footer class="footer">
        <div class="container footer-wrapper">
            <div class="footer-brand">
                    <span class="logo-text">@ Universo Otaku S.A</span>
            </div>

            <div class="footer-design">
                <span class="logo-text">Diseñado by Melycode</span>
            </div>

            <div class="footer-actions">
                <div class="social-links">
                    <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 class="modal-title">Tus mangas</h2>
        <ul id="cartItemList"></ul>
        <div class="total-container">
            <span>Total</span>
            <span><span id="cartTotalAmount">0.00</span> €</span>
        </div>
        <button id="btnCheckout">Finalizar compra</button>
    </div>
</div>


<div id="subscribeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeSubscribeModal">&times;</span>
        <h2 style="font-size:1.5rem; font-weight:800; color:#10143b; margin-bottom:0.5rem;">¡Únete a Universo Otaku!</h2>
        <p style="color:#555; margin-bottom:1rem;">Recibe novedades, ofertas y lanzamientos exclusivos.</p>
        <input type="email" id="subscribeEmail" class="search-input" placeholder="Tu correo electrónico" style="width:100%; margin-bottom:1rem;">
        <button id="btnConfirmSubscribe" class="btn-nav" style="width:100%;">CONFIRMAR</button>
        <div id="subscribeSuccess" style="display:none; text-align:center; margin-top:1.5rem;">
            <i class="fa-solid fa-circle-check" style="font-size:3rem; color:#fac746;"></i>
            <p style="font-weight:700; margin-top:0.5rem; color:#10143b;">¡Gracias por suscribirte!</p>
        </div>
    </div>
</div>

   <script src="script.js"></script>
</body>
</html>
